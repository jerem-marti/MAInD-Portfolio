# nginx config for the statically generated site (output of `npm run generate`,
# i.e. .output/public) served on the VPS.
#
# The site is English-default at / with French under /fr (Nuxt i18n strategy
# prefix_except_default). Because it is fully static, Nuxt does NOT perform any
# browser-language redirect (i18n.detectBrowserLanguage is off). Instead nginx
# owns a single root-only redirect: a first-time visitor whose browser prefers
# French and who lands on `/` is sent to `/fr` once. Every other URL is served
# verbatim, so bots and deep links are never redirected (SEO-clean).
#
# Adjust server_name / root / TLS to your setup; the i18n-relevant parts are the
# `map` and the `location = /` block.

# Map the Accept-Language header to a target. Only a leading French preference
# matches; everything else (incl. no header) stays empty → no redirect.
map $http_accept_language $i18n_root_redirect {
    default        "";
    "~*^\s*fr"     /fr;
}

server {
    listen 443 ssl http2;
    server_name jeremymartin.ch;

    # ssl_certificate / ssl_certificate_key ...  (your TLS config)

    root /var/www/jeremymartin.ch;   # = the generated .output/public
    index index.html;

    # Compression. The biggest single transfer win for a static site — shrinks
    # HTML/CSS/JS/SVG on the wire. gzip ships with every nginx; brotli needs the
    # ngx_brotli module (uncomment the block below if your build has it). Already-
    # compressed binaries (woff2, images, video) are intentionally excluded —
    # re-compressing them burns CPU for ~0 bytes. text/html is always compressed
    # by nginx, so it is not listed. Hoist to the http{} block to share it.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/xml
        application/rss+xml
        application/manifest+json
        text/plain;

    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/css text/javascript application/javascript application/json
    #              image/svg+xml application/xml application/rss+xml
    #              application/manifest+json text/plain;

    # Root-only language redirect. French browsers → /fr (302, once). A cookie
    # makes it sticky so a visitor who switches back to EN is not re-redirected.
    location = / {
        if ($cookie_i18n_redirected) { rewrite ^ /index.html last; }
        if ($i18n_root_redirect) {
            add_header Set-Cookie "i18n_redirected=1; Path=/; Max-Age=31536000; SameSite=Lax";
            return 302 $i18n_root_redirect;
        }
        try_files /index.html =404;
    }

    # ---------------------------------------------------------------------------
    # Caching. The site is static, so "caching" means HTTP cache headers, not an
    # app cache. Two tiers:
    #   - fingerprinted build output (filename changes every deploy) → 1 year,
    #     immutable. Safe: a changed file always gets a new URL.
    #   - everything else served under a stable name (derived images, videos, OG
    #     cards, downloads) → a finite max-age with no `immutable`, so replacing a
    #     file in place is picked up after the window (or on a hard refresh).
    # HTML is never hard-cached (see the catch-all): it must revalidate so a deploy
    # is visible immediately. `^~` keeps these prefix matches from being overridden
    # by the regex block below.
    # ---------------------------------------------------------------------------

    # Fingerprinted, content-hashed build assets — JS/CSS chunks (/_nuxt/) and the
    # self-hosted fonts (/_fonts/, where the hash IS the filename). Immutable, 1yr.
    location ^~ /_nuxt/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location ^~ /_fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Build-time derived assets under stable, deterministic URLs: @nuxt/image
    # output (/_ipx/) and the prerendered OG cards (/_og/). Long but revalidatable
    # — the URL is unchanged if a source image is replaced, so NOT `immutable`.
    location ^~ /_ipx/ {
        add_header Cache-Control "public, max-age=2592000";   # 30 days
        try_files $uri =404;
    }
    location ^~ /_og/ {
        add_header Cache-Control "public, max-age=2592000";   # 30 days
        try_files $uri =404;
    }

    # Raw static media kept under stable names — case-study videos and any
    # directly-served images. Moderate cache.
    location ^~ /videos/ {
        add_header Cache-Control "public, max-age=2592000";   # 30 days
        try_files $uri =404;
    }
    location ^~ /images/ {
        add_header Cache-Control "public, max-age=2592000";   # 30 days
        try_files $uri =404;
    }

    # Downloads (PDFs/decks). The CV can be re-uploaded under the same name, so
    # keep this short — a day — to avoid serving a stale document for long.
    location ^~ /files/ {
        add_header Cache-Control "public, max-age=86400";     # 1 day
        try_files $uri =404;
    }

    # llms.txt / *.md twins are text, not HTML; they regenerate on every deploy,
    # so revalidate rather than hard-cache.
    location ~* \.(txt|md)$ {
        default_type text/plain;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Static SSG catch-all: serve the prerendered file, the directory index, the
    # .html twin, then the prerendered 404. HTML (and any root file not matched
    # above — favicons, sitemaps, root PDFs) must always revalidate so a deploy is
    # picked up immediately. `no-cache` means "store but check freshness first",
    # which still yields a cheap 304 when nothing changed.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ $uri.html /404.html;
    }

    error_page 404 /404.html;
}
